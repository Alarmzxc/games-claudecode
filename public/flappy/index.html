<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Bird - 游戏合集</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="../index.html" class="back-btn">← 返回合集</a>
            <h1>🐦 Flappy Bird</h1>
            <span class="cloud-badge" id="cloudBadge">☁️ 本地</span>
        </header>

        <div class="game-area">
            <!-- 玩家名称 + 计分板 -->
            <div class="top-row">
                <div class="player-input-wrap">
                    <label for="playerName">🏷️ 玩家</label>
                    <input type="text" id="playerName" maxlength="12" placeholder="你的昵称">
                </div>
                <div class="score-board">
                    <div class="score-item">
                        <span class="label">得分</span>
                        <span id="score" class="value">0</span>
                    </div>
                    <div class="divider"></div>
                    <div class="score-item">
                        <span class="label">最高分</span>
                        <span id="highScore" class="value">0</span>
                    </div>
                </div>
            </div>

            <!-- 画布 -->
            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="320" height="480"></canvas>
                <div id="overlay" class="overlay">
                    <div id="overlayContent" class="overlay-content">
                        <h2>🐦 Flappy Bird</h2>
                        <p>点击或按空格控制飞行</p>
                        <button id="startBtn" class="btn">开始游戏</button>
                    </div>
                </div>
            </div>

            <!-- 操作控制 -->
            <div class="controls-bar">
                <div class="control-group">
                    <h3>🎮 操作</h3>
                    <div class="key-hint-row">
                        <kbd>Space</kbd>
                        <span class="or">或</span>
                        <kbd>↑</kbd>
                        <span class="or">或</span>
                        <kbd>W</kbd>
                        <span class="or">或</span>
                        <kbd>点击</kbd>
                    </div>
                    <p class="hint">点击屏幕 / 触屏 控制小鸟飞行</p>
                </div>
            </div>

            <!-- 排行榜 -->
            <div class="leaderboard" id="leaderboard">
                <div class="lb-header">
                    <h3>🏆 排行榜</h3>
                    <span class="lb-status" id="lbStatus">加载中...</span>
                </div>
                <div class="lb-list" id="lbList">
                    <div class="lb-empty">正在连接云端...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
