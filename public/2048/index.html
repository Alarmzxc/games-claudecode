<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - 游戏合集</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="../index.html" class="back-btn">← 返回合集</a>
            <h1>🟦 2048</h1>
            <span class="cloud-badge" id="cloudBadge">☁️ 本地</span>
        </header>

        <div class="game-area">
            <div class="top-row">
                <div class="player-input-wrap">
                    <label for="playerName">🏷️ 玩家</label>
                    <input type="text" id="playerName" maxlength="12" placeholder="你的昵称">
                </div>
                <div class="score-board">
                    <div class="score-item">
                        <span class="label">得分</span>
                        <span id="score" class="value">0</span>
                    </div>
                    <div class="divider"></div>
                    <div class="score-item">
                        <span class="label">最高分</span>
                        <span id="bestScore" class="value">0</span>
                    </div>
                </div>
            </div>

            <div class="grid-header">
                <span class="grid-title">🟦 2048</span>
                <button id="newGameBtn" class="btn-small">新游戏</button>
            </div>

            <div class="grid-wrapper">
                <div class="grid-container" id="gridContainer">
                    <div class="grid-bg" id="gridBg"></div>
                    <div class="tiles-container" id="tilesContainer"></div>
                </div>
                <div id="overlay" class="overlay hidden">
                    <div id="overlayContent" class="overlay-content">
                        <h2>🟦 2048</h2>
                        <p>使用方向键或滑动合并数字方块</p>
                        <button id="startBtn" class="btn">开始游戏</button>
                    </div>
                </div>
            </div>

            <div class="hint-bar">
                <span><kbd>←</kbd><kbd>→</kbd><kbd>↑</kbd><kbd>↓</kbd> 或滑动</span>
            </div>

            <div class="controls-bar">
                <div class="control-group mobile-controls">
                    <h3>🖱️ 触屏</h3>
                    <div class="touch-grid">
                        <div class="touch-row">
                            <button data-action="up" class="touch-btn">↑</button>
                        </div>
                        <div class="touch-row">
                            <button data-action="left" class="touch-btn">←</button>
                            <button data-action="down" class="touch-btn">↓</button>
                            <button data-action="right" class="touch-btn">→</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="leaderboard" id="leaderboard">
                <div class="lb-header">
                    <h3>🏆 排行榜</h3>
                    <span class="lb-status" id="lbStatus">加载中...</span>
                </div>
                <div class="lb-list" id="lbList">
                    <div class="lb-empty">正在连接云端...</div>
                </div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
