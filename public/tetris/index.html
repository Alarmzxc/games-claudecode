<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - 游戏合集</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="../index.html" class="back-btn">← 返回合集</a>
            <h1>🧱 俄罗斯方块</h1>
            <span class="cloud-badge" id="cloudBadge">☁️ 本地</span>
        </header>

        <div class="game-area">
            <!-- 玩家名称 + 计分板 -->
            <div class="top-row">
                <div class="player-input-wrap">
                    <label for="playerName">🏷️ 玩家</label>
                    <input type="text" id="playerName" maxlength="12" placeholder="你的昵称">
                </div>
                <div class="score-board">
                    <div class="score-item">
                        <span class="label">得分</span>
                        <span id="score" class="value">0</span>
                    </div>
                    <div class="divider"></div>
                    <div class="score-item">
                        <span class="label">行数</span>
                        <span id="lines" class="value">0</span>
                    </div>
                    <div class="divider"></div>
                    <div class="score-item">
                        <span class="label">等级</span>
                        <span id="level" class="value">1</span>
                    </div>
                    <div class="divider"></div>
                    <div class="score-item">
                        <span class="label">最高分</span>
                        <span id="highScore" class="value">0</span>
                    </div>
                </div>
            </div>

            <!-- 等级进度条 -->
            <div class="speed-bar-wrap">
                <div class="speed-track">
                    <div id="levelFill" class="speed-fill"></div>
                </div>
                <span id="levelLabel" class="speed-label">等级 1</span>
            </div>

            <!-- 游戏棋盘 + 预览 -->
            <div class="board-row">
                <div class="canvas-wrapper">
                    <canvas id="gameCanvas" width="250" height="500"></canvas>
                    <div id="overlay" class="overlay">
                        <div id="overlayContent" class="overlay-content">
                            <h2>🧱 俄罗斯方块</h2>
                            <p>使用方向键控制<br>↑ 旋转 · ↓ 加速 · Space 直接落下</p>
                            <button id="startBtn" class="btn">开始游戏</button>
                        </div>
                    </div>
                </div>
                <div class="side-panel">
                    <div class="next-box">
                        <span class="box-label">下一个</span>
                        <canvas id="nextCanvas" width="100" height="100"></canvas>
                    </div>
                    <div class="key-hints">
                        <div class="hint-row"><kbd>←</kbd><kbd>→</kbd> 移动</div>
                        <div class="hint-row"><kbd>↑</kbd> 旋转</div>
                        <div class="hint-row"><kbd>↓</kbd> 加速</div>
                        <div class="hint-row"><kbd>Space</kbd> 直落</div>
                        <div class="hint-row"><kbd>P</kbd> 暂停</div>
                    </div>
                </div>
            </div>

            <!-- 操作控制 -->
            <div class="controls-bar">
                <div class="control-group mobile-controls">
                    <h3>🖱️ 触屏</h3>
                    <div class="tetris-touch">
                        <div class="touch-row">
                            <button data-action="rotate" class="touch-btn">↻</button>
                        </div>
                        <div class="touch-row">
                            <button data-action="left" class="touch-btn">←</button>
                            <button data-action="down" class="touch-btn">↓</button>
                            <button data-action="right" class="touch-btn">→</button>
                        </div>
                        <div class="touch-row">
                            <button data-action="drop" class="touch-btn">⤓</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 排行榜 -->
            <div class="leaderboard" id="leaderboard">
                <div class="lb-header">
                    <h3>🏆 排行榜</h3>
                    <span class="lb-status" id="lbStatus">加载中...</span>
                </div>
                <div class="lb-list" id="lbList">
                    <div class="lb-empty">正在连接云端...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
