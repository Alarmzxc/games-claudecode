<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - 游戏合集</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="../index.html" class="back-btn">← 返回合集</a>
            <h1>🐍 贪吃蛇</h1>
            <span class="cloud-badge" id="cloudBadge">☁️ 本地</span>
        </header>

        <div class="game-area">
            <!-- 玩家名称 + 计分板 -->
            <div class="top-row">
                <div class="player-input-wrap">
                    <label for="playerName">🏷️ 玩家</label>
                    <input type="text" id="playerName" maxlength="12" placeholder="你的昵称">
                </div>
                <div class="score-board">
                    <div class="score-item">
                        <span class="label">得分</span>
                        <span id="score" class="value">0</span>
                    </div>
                    <div class="divider"></div>
                    <div class="score-item">
                        <span class="label">最高分</span>
                        <span id="highScore" class="value">0</span>
                    </div>
                    <div class="divider"></div>
                    <div class="score-item">
                        <span class="label">速度</span>
                        <span id="speed" class="value">1</span>
                    </div>
                    <div class="divider"></div>
                    <div class="score-item">
                        <span class="label">上限</span>
                        <span id="speedMax" class="value">—</span>
                    </div>
                </div>
            </div>

            <!-- 速度进度条 -->
            <div class="speed-bar-wrap">
                <div class="speed-track">
                    <div id="speedFill" class="speed-fill"></div>
                </div>
                <span id="speedLabel" class="speed-label">慢速</span>
            </div>

            <!-- 画布 -->
            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
                <div id="overlay" class="overlay">
                    <div id="overlayContent" class="overlay-content">
                        <h2>🐍 贪吃蛇</h2>
                        <p>使用方向键或 WASD 控制移动</p>
                        <button id="startBtn" class="btn">开始游戏</button>
                    </div>
                </div>
            </div>

            <!-- 操作控制 -->
            <div class="controls-bar">
                <div class="control-group">
                    <h3>⌨️ 键盘</h3>
                    <div class="key-hint-row">
                        <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd>
                        <span class="or">或</span>
                        <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd>
                    </div>
                    <p class="hint"><kbd>Space</kbd> 暂停 · <kbd>Enter</kbd> 开始</p>
                </div>

                <div class="control-group mobile-controls">
                    <h3>🖱️ 触屏</h3>
                    <div class="touch-btns">
                        <button data-dir="up" class="touch-btn">↑</button>
                        <div class="touch-row">
                            <button data-dir="left" class="touch-btn">←</button>
                            <button data-dir="down" class="touch-btn">↓</button>
                            <button data-dir="right" class="touch-btn">→</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 排行榜 -->
            <div class="leaderboard" id="leaderboard">
                <div class="lb-header">
                    <h3>🏆 排行榜</h3>
                    <span class="lb-status" id="lbStatus">加载中...</span>
                </div>
                <div class="lb-list" id="lbList">
                    <div class="lb-empty">正在连接云端...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
